name: Trail Conditions Refresh

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh job
        run: |
          curl -fsS --max-time 120 \
            -X POST "${{ secrets.REFRESH_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
